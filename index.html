<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Castle Token</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: #fff;
      font-family: system-ui, sans-serif;
      padding: 24px;
      text-align: center;
    }
    pre {
      margin: 0;
      padding: 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      max-width: 100%;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 1rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <pre id="result">Loading token...</pre>
  <script>
    (async () => {
      try {
        const res = await fetch('/api/replit');
        const text = await res.text();
        document.getElementById('result').textContent = text;
      } catch (err) {
        document.getElementById('result').textContent = 'Error: ' + err.message;
      }
    })();
  </script>
</body>
</html>
